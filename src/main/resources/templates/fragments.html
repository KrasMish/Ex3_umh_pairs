<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head (titulo)">
    <meta charset="UTF-8"/>
    <title th:text="${titulo}"></title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
</head>

<nav th:fragment="menu" class="navbar navbar-expand-lg navbar-light bg-light">

    <a class="navbar-brand" href="#">ToDo App</a>

    <div class="collapse navbar-collapse">

        <ul class="navbar-nav mr-auto">

            <li class="nav-item">
                <a class="nav-link" th:href="@{/usuarios}">
                    Users
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/equipos}">
                    Teams
                </a>
            </li>

            <li class="nav-item" th:if="${usuario != null}">
                <a class="nav-link"
                   th:href="@{/usuarios/{id}/tareas(id=${usuario.id})}">
                    Tasks
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/about}">
                    About
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link" th:href="@{/logout}">
                    Logout
                </a>
            </li>

        </ul>

    </div>

</nav>

<div th:fragment="javascript">
    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/js/popper.min.js}"></script>
    <script th:src="@{/js/bootstrap.min.js}"></script>
</div>

</html>
