name: Integration tests
on: push
jobs:
  container-job:
    runs-on: ubuntu-latest
    container: openjdk:21-ea-1-jdk
    services:
      # Label used to access the service container
      postgres:
        # Docker Hub image
        image: postgres:13
        # Variables to start PostgreSQL
        env:
          POSTGRES_USER: atsd
          POSTGRES_PASSWORD: atsd
          POSTGRES_DB: atsd_test
        # We define checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v1

      - name: Make Maven Wrapper executable
        run: chmod +x ./mvnw

      - name: Launch tests with Maven
        run: ./mvnw test -Dspring.profiles.active=postgres
        env:
          POSTGRES_HOST: postgres