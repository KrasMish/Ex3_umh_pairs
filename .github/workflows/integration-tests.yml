name: Integration tests

on:
  push:

jobs:
  container-job:
    runs-on: ubuntu-latest

    container:
      image: openjdk:21-ea-1-jdk

    services:
      postgres:
        image: postgres:13

        env:
          POSTGRES_USER: atsd
          POSTGRES_PASSWORD: atsd
          POSTGRES_DB: atsd_test

        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v1

      - name: Launch tests with Maven
        run: |
          chmod +x ./mvnw
          ./mvnw test -Dspring.profiles.active=postgres

        env:
          POSTGRES_HOST: postgres