name: Integration tests
on: push
jobs:
  container-job:
    runs-on: ubuntu-latest
    container: openjdk:21-ea-1-jdk
    services:
      # Etiqueta usada para acceder al contenedor del servicio
      postgres:
        # Imagen Docker Hub
        image: postgres:13
        # Variables para arrancar PostgreSQL
        env:
          POSTGRES_USER: atsd
          POSTGRES_PASSWORD: atsd
          POSTGRES_DB: atsd_test
        # Definimos checks para esperar hasta q postgres ya ha comenzado
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v1
          - name: Make Maven Wrapper executable
              run: chmod +x ./mvnw
                - name: Run tests
                  run: ./mvnw test -Dspring.profiles.active=postgres
                  env:
                    POSTGRES_HOST: postgres
